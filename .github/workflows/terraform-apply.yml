name: Terraform Apply for Huawei Dev Environment

on:
  push:
    branches:
      - main

concurrency:
  group: terraform-apply-dev
  cancel-in-progress: false

env:
  TF_VERSION: "1.9.8"
  WORKING_DIR: environments/dev

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.HW_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.HW_SECRET_KEY }}" \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="region=${{ secrets.HW_REGION }}" \
            -backend-config="endpoints={s3=\"https://obs.af-south-1.myhuaweicloud.com\"}" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="use_path_style=false" \
            -backend-config="skip_s3_checksum=true"

      - name: Terraform Apply
        run: |
          terraform apply \
            -var="access_key=${{ secrets.HW_ACCESS_KEY }}" \
            -var="secret_key=${{ secrets.HW_SECRET_KEY }}" \
            -var="region=${{ secrets.HW_REGION }}" \
            -var="project_id=${{ secrets.HW_PROJECT_ID }}" \
            -var="domain_id=${{ secrets.HW_DOMAIN_ID }}" \
            -auto-approve \
            -no-color